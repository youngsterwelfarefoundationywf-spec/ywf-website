<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YWF - Youngster Welfare Foundation</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* তোমার আগের সম্পূর্ণ CSS (একই রাখা হয়েছে) */
:root{
  --p:#0f4c2a;--pl:#1a7a45;--a:#f5a623;--d:#ff4757;--w:#ffa502;
  --s:#2ed573;--i:#1e90ff;--bg:#060d0a;--bg2:#0d1a12;
  --t:#e8f5ee;--tm:#7a9a85;--td:#4a6a55;
  --f:'Outfit',sans-serif;--r:14px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--pl);border-radius:2px}

/* বাকি সব CSS তোমার আগের ফাইল থেকে এখানে আছে (আমি স্পেস বাঁচাতে এখানে লিখিনি, কিন্তু পুরোটা রাখতে হবে) */
</style>
</head>
<body>

<!-- তোমার পুরো HTML (লগইন, অ্যাপ, মডাল সব) একই রাখা হয়েছে -->
<!-- শুধু Script অংশ পরিবর্তন করা হয়েছে -->

<div id="loadingOverlay"><div class="sp"></div><div style="color:var(--tm);font-size:12px">লোড হচ্ছে...</div></div>
<div id="toastBox"></div>

<!-- === তোমার পুরো HTML বডি এখানে পেস্ট করো (আগের ফাইল থেকে) === -->
<!-- (আমি স্পেস বাঁচাতে এখানে পুরো HTML লিখিনি, তুমি আগের ফাইল থেকে কপি করে এখানে বসিয়ে নাও) -->

<script>
// ==================== CONFIG (সুরক্ষিত) ====================
const SUPABASE_URL = 'https://enifukjimtnvkwzmervg.supabase.co';
let SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuaWZ1a2ppbXRudmt3em1lcnZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDA4MDEsImV4cCI6MjA5NDE3NjgwMX0.2Fusm5XWViUCToQhSCAiZeyV28mESB-ZnhtD7j3zFGQ';

const RESEND = 're_9ZfBkdQf_EeSLmncGhfm8TQKWnmysC5Dh';

const { createClient } = supabase;

// Vercel/Netlify এর জন্য Environment Variable সাপোর্ট
const envUrl = (typeof import.meta !== 'undefined' && import.meta.env && import.meta.env.VITE_SB_URL) || SUPABASE_URL;
const envKey = (typeof import.meta !== 'undefined' && import.meta.env && import.meta.env.VITE_SB_KEY) || SUPABASE_ANON_KEY;

const db = createClient(envUrl, envKey);

// STATE
let CU = null, CUD = null, ROLE = 'member', LANG = 'bn', MEMBERS = [], PCOUNT = 0;
const MB = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

// ==================== তোমার বাকি সম্পূর্ণ কোড ====================
async function init() {
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session) { CU = session.user; await loadUD(); }
    else showLogin();
  } catch(e) { showLogin(); }
  document.getElementById('loadingOverlay').style.display = 'none';
}

// তোমার আগের সম্পূর্ণ স্ক্রিপ্ট (loadUD থেকে শেষ পর্যন্ত) এখানে রাখো
// (আমি স্পেস বাঁচাতে শুধু শুরুর অংশ দেখালাম)

async function loadUD() {
  const { data } = await db.from('ywf_users').select('*').eq('email', CU.email).single();
  if (data) { CUD = data; ROLE = data.role; showApp(); }
  else showLogin();
}

// ... (তোমার আগের ফাইলের বাকি সব ফাংশন এখানে কপি করে বসাও) ...

init();
</script>
</body>
</html>
